<svg width="800" height="330" viewBox="0 0 800 330" xmlns="http://www.w3.org/2000/svg" font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace">
  <defs>
    <clipPath id="round">
      <rect x="0" y="0" width="800" height="330" rx="12" ry="12"/>
    </clipPath>
  </defs>

  <g clip-path="url(#round)">
    <!-- window background -->
    <rect x="0" y="0" width="800" height="330" fill="#0d1117"/>
    <rect x="0" y="0" width="800" height="330" fill="none" stroke="#30363d" stroke-width="1"/>

    <!-- title bar -->
    <rect x="0" y="0" width="800" height="34" fill="#161b22"/>
    <line x1="0" y1="34" x2="800" y2="34" stroke="#30363d" stroke-width="1"/>

    <!-- traffic lights -->
    <circle cx="20" cy="17" r="6" fill="#FF5F56"/>
    <circle cx="40" cy="17" r="6" fill="#FFBD2E"/>
    <circle cx="60" cy="17" r="6" fill="#27C93F"/>

    <!-- title -->
    <text x="400" y="22" text-anchor="middle" font-size="13" fill="#8b949e">pranav@dev: ~</text>

    <!-- terminal body -->
    <text x="24" y="66" font-size="15" fill="#58a6ff">$ <tspan fill="#c9d1d9">whoami</tspan></text>
    <text x="24" y="92" font-size="15" fill="#39FF14">Pranav Kodlinge — AI Engineer</text>

    <text x="24" y="128" font-size="15" fill="#58a6ff">$ <tspan fill="#c9d1d9">cat status.log</tspan></text>
    <text x="24" y="154" font-size="15" fill="#39FF14">wake -&gt; code -&gt; sleep -&gt; repeat</text>
    <text x="24" y="176" font-size="15" fill="#39FF14">shipping GenAI to 147+ enterprise clients</text>
    <text x="24" y="198" font-size="15" fill="#39FF14">github: quiet by choice (NDA says hi)</text>

    <text x="24" y="234" font-size="15" fill="#58a6ff">$ <tspan fill="#c9d1d9">echo $CURRENTLY_BUILDING</tspan></text>
    <text x="24" y="260" font-size="15" fill="#39FF14">agents that talk to agents, RAG that stops lying</text>

    <text x="24" y="296" font-size="15" fill="#58a6ff">$</text>
    <rect x="40" y="285" width="9" height="16" fill="#39FF14">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
